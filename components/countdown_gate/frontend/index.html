<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Segoe UI", sans-serif;
        color: #1c1c1e;
        background: transparent;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
      }
      #surface {
        box-sizing: border-box;
        min-height: 420px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }
      #panel {
        width: min(100%, 420px);
        text-align: center;
      }
      #title {
        margin: 0 0 28px;
        font-size: 24px;
        line-height: 1.3;
        font-weight: 500;
      }
      #dial {
        width: 168px;
        height: 168px;
        margin: 0 auto;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background:
          conic-gradient(#0a84ff var(--progress), rgba(60, 60, 67, 0.14) 0);
        transition: background 80ms linear;
      }
      #dial::before {
        content: "";
        grid-area: 1 / 1;
        width: 138px;
        height: 138px;
        border-radius: 50%;
        background: #fff;
      }
      #seconds {
        grid-area: 1 / 1;
        position: relative;
        z-index: 1;
        font-size: 52px;
        line-height: 1;
        font-weight: 650;
        font-variant-numeric: tabular-nums;
      }
      #caption {
        margin-top: 22px;
        color: rgba(60, 60, 67, 0.68);
        font-size: 18px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          color: #f2f2f7;
        }
        #dial::before {
          background: #1c1c1e;
        }
        #caption {
          color: rgba(235, 235, 245, 0.66);
        }
      }
    </style>
  </head>
  <body>
    <main id="surface" aria-live="polite">
      <section id="panel">
        <h1 id="title">准备开始</h1>
        <div id="dial" style="--progress: 0%">
          <div id="seconds">8</div>
        </div>
        <div id="caption">倒计时结束后自动继续</div>
      </section>
    </main>
    <script>
      const title = document.getElementById("title");
      const dial = document.getElementById("dial");
      const seconds = document.getElementById("seconds");

      let token = "";
      let durationMs = 8000;
      let startedAt = 0;
      let frame = null;
      let completed = false;

      function send(type, payload) {
        window.parent.postMessage({ isStreamlitMessage: true, type, ...payload }, "*");
      }

      function sendValue(value) {
        send("streamlit:setComponentValue", { value, dataType: "json" });
      }

      function complete() {
        if (completed) return;
        completed = true;
        sendValue({
          event_id: `${token}:${Date.now()}`,
          token,
          type: "countdown_complete",
        });
      }

      function animate(now) {
        const elapsed = Math.max(0, now - startedAt);
        const ratio = Math.min(1, elapsed / durationMs);
        const remaining = Math.max(0, Math.ceil((durationMs - elapsed) / 1000));
        dial.style.setProperty("--progress", `${ratio * 100}%`);
        seconds.textContent = String(remaining);
        if (ratio >= 1) {
          complete();
          return;
        }
        frame = requestAnimationFrame(animate);
      }

      function configure(args) {
        const nextToken = String(args.token ?? "");
        title.textContent = String(args.title ?? "准备开始");
        durationMs = Math.max(1, Number(args.duration_seconds ?? 8)) * 1000;
        if (nextToken === token && frame !== null) return;
        token = nextToken;
        completed = false;
        if (frame !== null) cancelAnimationFrame(frame);
        startedAt = performance.now();
        frame = requestAnimationFrame(animate);
      }

      window.addEventListener("message", (event) => {
        if (event.data?.type !== "streamlit:render") return;
        configure(event.data.args ?? {});
        send("streamlit:setFrameHeight", { height: 420 });
      });

      window.addEventListener("beforeunload", () => {
        if (frame !== null) cancelAnimationFrame(frame);
      });

      send("streamlit:componentReady", { apiVersion: 1 });
      send("streamlit:setFrameHeight", { height: 420 });
    </script>
  </body>
</html>
